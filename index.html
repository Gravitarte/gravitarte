<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#12111a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GRAVITARTE — Agendamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════════════════
       FIREBASE — substitua os valores abaixo pelas suas
       configurações (veja o guia no README)
  ════════════════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ⬇️ COLE AQUI as suas configurações do Firebase
    const firebaseConfig = {
      apiKey:            "AIzaSyDMxeSOUIzSbl8r1niy83_Da66_x0Wt8rQ",
      authDomain:        "gravitarte-57011.firebaseapp.com",
      databaseURL:       "https://gravitarte-57011-default-rtdb.firebaseio.com",
      projectId:         "gravitarte-57011",
      storageBucket:     "gravitarte-57011.firebasestorage.app",
      messagingSenderId: "657622099981",
      appId:             "1:657622099981:web:5724a4d5b56288f5a44d44"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // Expõe as funções para o código principal
    window._fb = { db, ref, set, remove, onValue };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:       #f6f5f1;
      --surface:  #ffffff;
      --surface2: #eeece7;
      --border:   rgba(0,0,0,0.09);
      --border2:  rgba(0,0,0,0.16);
      --text:     #12111a;
      --text2:    #6b6a6a;
      --text3:    #a8a7a1;
      --accent:   #12111a;
      --radius:   14px;
      --rsm:       9px;
      --shadow:   0 1px 4px rgba(0,0,0,0.07);
    }

    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; }

    /* ── APP SHELL ───────────────────────────────────────── */
    .app { max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg); }

    /* ── HEADER ─────────────────────────────────────────── */
    .header {
      background: var(--accent);
      color: #fff;
      padding: 3rem 1.25rem 1rem;
      position: sticky; top: 0; z-index: 20;
    }
    .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:.9rem; }
    .logo { display:flex; align-items:baseline; gap:6px; }
    .logo-name { font-size:22px; font-weight:600; letter-spacing:1.5px; }
    .logo-sub  { font-size:11px; opacity:.45; letter-spacing:.5px; }
    .settings-btn {
      background: rgba(255,255,255,0.11);
      border: none; color:#fff;
      width:36px; height:36px; border-radius:50%;
      cursor:pointer; font-size:17px;
      display:flex; align-items:center; justify-content:center;
      transition: background .15s;
    }
    .settings-btn:hover { background:rgba(255,255,255,0.22); }

    /* date nav */
    .date-nav {
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(255,255,255,0.08); border-radius:var(--rsm); padding:5px 8px;
    }
    .date-nav button { background:none; border:none; color:rgba(255,255,255,.8); font-size:22px; cursor:pointer; padding:3px 8px; border-radius:6px; line-height:1; transition:background .1s; }
    .date-nav button:hover { background:rgba(255,255,255,.1); }
    .date-label { font-size:13px; font-weight:500; color:#fff; text-transform:capitalize; text-align:center; flex:1; }

    /* ── NAV TABS ────────────────────────────────────────── */
    .nav-tabs {
      display:flex; background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:0 .75rem;
      position:sticky; top:120px; z-index:19;
      overflow-x:auto;
    }
    .nav-tabs::-webkit-scrollbar { display:none; }
    .nav-tab {
      padding:11px 12px; font-size:13px; font-weight:500;
      cursor:pointer; color:var(--text2);
      border-bottom:2px solid transparent; margin-bottom:-1px;
      transition:all .15s; white-space:nowrap;
    }
    .nav-tab.active { color:var(--text); border-bottom-color:var(--accent); }

    /* ── CONTENT ─────────────────────────────────────────── */
    .content { padding:1rem; padding-bottom:5rem; }

    /* ── ROOM FILTER TABS ───────────────────────────────── */
    .room-tabs { display:flex; gap:6px; margin-bottom:1rem; overflow-x:auto; padding-bottom:2px; }
    .room-tabs::-webkit-scrollbar { display:none; }
    .rtab {
      padding:7px 15px; border-radius:20px;
      border:1px solid var(--border2); background:var(--surface);
      font-size:13px; font-weight:500; cursor:pointer;
      color:var(--text2); white-space:nowrap; transition:all .15s;
    }
    .rtab.active { color:#fff; border-color:transparent; }

    /* ── SCHEDULE ────────────────────────────────────────── */
    .srow { display:flex; align-items:stretch; gap:8px; margin-bottom:6px; min-height:48px; }
    .tlbl { font-size:11px; color:var(--text3); width:34px; flex-shrink:0; padding-top:8px; text-align:right; font-weight:500; }
    .slot {
      flex:1; border-radius:var(--rsm); border:1px solid var(--border);
      background:var(--surface); display:flex; align-items:center;
      padding:10px 14px; cursor:pointer; transition:all .15s;
      font-size:13px; color:var(--text2); box-shadow:var(--shadow);
    }
    .slot:hover { border-color:var(--border2); }
    .slot .bname { font-weight:600; font-size:13px; }
    .slot .btag  { font-size:11px; margin-left:auto; padding:3px 8px; border-radius:20px; font-weight:500; }
    .slot .free-lbl { font-size:13px; color:var(--text3); }
    .slot .plus-i   { margin-left:auto; font-size:22px; color:var(--text3); line-height:1; }

    /* ── OVERVIEW ────────────────────────────────────────── */
    .ov-room { margin-bottom:1.5rem; }
    .ov-room-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .ov-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .ov-name { font-size:14px; font-weight:600; color:var(--text); }
    .ov-slots { display:flex; gap:5px; flex-wrap:wrap; }
    .ov-slot {
      font-size:12px; font-weight:500; padding:5px 10px;
      border-radius:var(--rsm); border:1px solid var(--border);
      background:var(--surface); cursor:pointer; color:var(--text2);
      transition:all .15s; box-shadow:var(--shadow);
    }
    .ov-slot:hover { border-color:var(--border2); }
    .ov-slot.ov-booked { color:#fff; border-color:transparent; }

    /* ── CALENDAR ────────────────────────────────────────── */
    .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .cal-header h2 { font-size:16px; font-weight:600; text-transform:capitalize; }
    .cal-nav-btn { background:var(--surface); border:1px solid var(--border); border-radius:var(--rsm); padding:6px 12px; cursor:pointer; font-size:15px; color:var(--text2); }
    .cal-nav-btn:hover { background:var(--surface2); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:1rem; }
    .cal-weekday { text-align:center; font-size:11px; font-weight:600; color:var(--text3); padding:6px 0; text-transform:uppercase; letter-spacing:.5px; }
    .cal-day {
      aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      border-radius:var(--rsm); cursor:pointer; font-size:13px; font-weight:500;
      color:var(--text2); position:relative; transition:all .15s; border:1px solid transparent;
    }
    .cal-day:hover { background:var(--surface); border-color:var(--border); }
    .cal-day.today { background:var(--accent); color:#fff; }
    .cal-day.today:hover { opacity:.9; }
    .cal-day.selected { background:var(--surface); border-color:var(--accent); color:var(--text); }
    .cal-day.other-month { color:var(--text3); opacity:.4; }
    .cal-day.has-bookings::after {
      content:''; position:absolute; bottom:4px;
      width:4px; height:4px; border-radius:50%; background:var(--accent);
    }
    .cal-day.today.has-bookings::after { background:#fff; }
    .cal-day-detail { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow); }
    .cal-day-detail h3 { font-size:14px; font-weight:600; margin-bottom:.75rem; color:var(--text); text-transform:capitalize; }
    .cal-booking-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .cal-booking-item:last-child { border-bottom:none; }
    .cal-booking-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .cal-booking-info { flex:1; }
    .cal-booking-time { font-size:12px; font-weight:600; color:var(--text); }
    .cal-booking-room { font-size:11px; color:var(--text2); }
    .cal-booking-name { font-size:12px; color:var(--text2); margin-left:auto; }
    .cal-empty { font-size:13px; color:var(--text3); text-align:center; padding:1.5rem 0; }

    /* ── SETTINGS PANEL ──────────────────────────────────── */
    .settings-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:200; }
    .settings-overlay.open { display:block; }
    .settings-panel {
      position:fixed; top:0; right:0; bottom:0; width:min(360px,100vw);
      background:var(--bg); z-index:201; overflow-y:auto;
      padding:2.5rem 1.25rem 4rem; transform:translateX(100%);
      transition:transform .25s ease; box-shadow:-4px 0 24px rgba(0,0,0,.12);
    }
    .settings-panel.open { transform:translateX(0); }
    .settings-panel-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
    .settings-panel-hdr h2 { font-size:18px; font-weight:600; }
    .close-settings { background:var(--surface2); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; color:var(--text); }
    .room-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:.75rem; box-shadow:var(--shadow); }
    .room-card-hdr { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
    .room-card-hdr .dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; }
    .room-card-hdr span { font-size:15px; font-weight:600; color:var(--text); }
    .field-label { font-size:12px; font-weight:500; color:var(--text2); display:block; margin-bottom:5px; }
    .field-input {
      width:100%; padding:10px 12px; border:1px solid var(--border2); border-radius:var(--rsm);
      font-size:14px; font-family:inherit; color:var(--text); background:var(--bg);
      margin-bottom:1rem; outline:none; transition:border-color .15s;
    }
    .field-input:focus { border-color:var(--accent); }
    .color-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1rem; }
    .cpick { width:26px; height:26px; border-radius:50%; cursor:pointer; border:3px solid transparent; outline:2px solid transparent; transition:all .15s; }
    .cpick.selected { outline:2px solid var(--accent); outline-offset:2px; }
    .card-actions { display:flex; gap:8px; }
    .btn { flex:1; padding:10px; font-size:13px; font-weight:500; font-family:inherit; border-radius:var(--rsm); cursor:pointer; border:1px solid var(--border2); background:var(--surface); color:var(--text); transition:all .15s; }
    .btn:hover { background:var(--surface2); }
    .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-primary:hover { opacity:.88; }
    .btn-danger { color:#a32d2d; border-color:#f0b0b0; }
    .btn-danger:hover { background:#fff0f0; }
    .add-room-btn { width:100%; padding:12px; font-size:14px; font-weight:500; font-family:inherit; border-radius:var(--radius); cursor:pointer; border:1.5px dashed var(--border2); background:transparent; color:var(--text2); transition:all .15s; margin-top:4px; }
    .add-room-btn:hover { background:var(--surface); color:var(--text); }

    /* ── MODALS ──────────────────────────────────────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; justify-content:center; z-index:100; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--surface); border-radius:var(--radius) var(--radius) var(--rsm) var(--rsm); padding:1.5rem; width:100%; max-width:400px; border:1px solid var(--border); animation:slideUp .2s ease; }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .modal h2 { font-size:16px; font-weight:600; margin-bottom:4px; }
    .modal-sub { font-size:13px; color:var(--text2); margin-bottom:1.25rem; }
    .modal-actions { display:flex; gap:8px; margin-top:.25rem; }
    .modal-actions .btn { padding:12px; font-size:14px; }

    /* ── SYNC BADGE ──────────────────────────────────────── */
    .sync-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; position:absolute; top:1rem; right:1.25rem; }
    .sync-badge.ok    { background:rgba(29,158,117,.18); color:#0f6e56; }
    .sync-badge.error { background:rgba(211,68,48,.15);  color:#993c1d; }
    .sync-badge.wait  { background:rgba(255,255,255,.12); color:rgba(255,255,255,.7); }
    .sync-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

    /* ── TOAST ───────────────────────────────────────────── */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent); color:#fff; padding:11px 20px; border-radius:20px; font-size:13px; font-weight:500; z-index:300; white-space:nowrap; transition:transform .3s ease; box-shadow:0 4px 16px rgba(0,0,0,.2); }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ── LOADING ─────────────────────────────────────────── */
    #loading { position:fixed; inset:0; background:var(--accent); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:1rem; }
    #loading .logo-load { font-size:28px; font-weight:600; letter-spacing:2px; color:#fff; }
    #loading .sub-load  { font-size:12px; color:rgba(255,255,255,.4); letter-spacing:1px; }
    .spinner { width:28px; height:28px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="logo-load">GRAVITARTE</div>
  <div class="spinner"></div>
  <div class="sub-load">conectando...</div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="header">
    <span class="sync-badge wait" id="sync-badge"><span class="sync-dot"></span> sincronizando</span>
    <div class="header-top">
      <div class="logo">
        <span class="logo-name">GRAVITARTE</span>
        <span class="logo-sub">STUDIO</span>
      </div>
      <button class="settings-btn" onclick="openSettings()" title="Configurações">⚙️</button>
    </div>
    <div class="date-nav" id="date-nav-bar">
      <button onclick="changeDate(-1)">‹</button>
      <span class="date-label" id="date-label"></span>
      <button onclick="changeDate(1)">›</button>
    </div>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchView('single',this)">Por sala</div>
    <div class="nav-tab" onclick="switchView('overview',this)">Visão geral</div>
    <div class="nav-tab" onclick="switchView('calendar',this)">📅 Calendário</div>
  </div>

  <div class="content">
    <div id="view-single">
      <div class="room-tabs" id="room-tabs"></div>
      <div id="schedule"></div>
    </div>
    <div id="view-overview" style="display:none"><div id="overview"></div></div>
    <div id="view-calendar" style="display:none"><div id="calendar"></div></div>
  </div>
</div>

<!-- Modal: Reservar -->
<div class="modal-overlay" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p class="modal-sub" id="modal-sub"></p>
    <label class="field-label">Seu nome (professor)</label>
    <input class="field-input" type="text" id="prof-name" placeholder="Ex: Ana Silva" maxlength="40" />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmBooking()">Reservar sala</button>
    </div>
  </div>
</div>

<!-- Modal: Cancelar -->
<div class="modal-overlay" id="cancel-modal-bg">
  <div class="modal">
    <h2 id="cancel-title"></h2>
    <p class="modal-sub" id="cancel-sub"></p>
    <div class="modal-actions">
      <button class="btn" onclick="closeCancelModal()">Fechar</button>
      <button class="btn btn-danger" onclick="doCancel()">Cancelar reserva</button>
    </div>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-panel-hdr">
    <h2>Configurações</h2>
    <button class="close-settings" onclick="closeSettings()">✕</button>
  </div>
  <div id="settings-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════════
const HOURS = Array.from({ length: 16 }, (_, i) => i + 6); // 6h–21h
const COLOR_OPTIONS = [
  { hex:'#7F77DD', light:'#EEEDFE', text:'#3C3489', label:'Roxo'       },
  { hex:'#1D9E75', light:'#E1F5EE', text:'#085041', label:'Verde'      },
  { hex:'#EF9F27', light:'#FAEEDA', text:'#633806', label:'Âmbar'      },
  { hex:'#D85A30', light:'#FAECE7', text:'#4A1B0C', label:'Coral'      },
  { hex:'#D4537E', light:'#FBEAF0', text:'#4B1528', label:'Rosa'       },
  { hex:'#378ADD', light:'#E6F1FB', text:'#042C53', label:'Azul'       },
  { hex:'#639922', light:'#EAF3DE', text:'#173404', label:'Verde-limão'},
  { hex:'#888780', light:'#F1EFE8', text:'#2C2C2A', label:'Cinza'      },
];

// ═══════════════════════════════════════════════════════════
// ESTADO LOCAL
// ═══════════════════════════════════════════════════════════
let rooms = JSON.parse(localStorage.getItem('grav_rooms') || 'null') || [
  { id:'venus', name:'Vênus', icon:'♀', color: COLOR_OPTIONS[0] },
  { id:'lunar', name:'Lunar', icon:'☾', color: COLOR_OPTIONS[1] },
  { id:'solar', name:'Solar', icon:'☀', color: COLOR_OPTIONS[2] },
];
let bookings = {};          // { "roomId|YYYY-MM-DD|hour": "Nome" }
let currentRoom        = rooms[0]?.id || '';
let currentDateOffset  = 0;
let currentView        = 'single';
let calendarMonth      = new Date();   // mês exibido no calendário
let selectedCalDay     = null;         // data selecionada no calendário
let pendingSlot        = null;
let cancelSlot         = null;
let fbReady            = false;
let { db, ref: fbRef, set: fbSet, remove: fbRemove, onValue: fbOnValue } = {};

// ═══════════════════════════════════════════════════════════
// FIREBASE — inicializa após o módulo carregar
// ═══════════════════════════════════════════════════════════
window.addEventListener('firebase-ready', () => {
  ({ db, ref: fbRef, set: fbSet, remove: fbRemove, onValue: fbOnValue } = window._fb);
  fbReady = true;

  // Escuta TODAS as reservas em tempo real
  fbOnValue(fbRef(db, 'bookings'), snapshot => {
    bookings = snapshot.val() || {};
    setSyncBadge('ok');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    refreshCurrentView();
  }, err => {
    setSyncBadge('error');
    console.error(err);
    // Mostra o app mesmo assim (modo offline)
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
  });

  // Escuta configurações das salas
  fbOnValue(fbRef(db, 'rooms'), snapshot => {
    if (snapshot.val()) {
      rooms = snapshot.val();
      localStorage.setItem('grav_rooms', JSON.stringify(rooms));
      refreshCurrentView();
    }
  });
});

function setSyncBadge(state) {
  const b = document.getElementById('sync-badge');
  b.className = 'sync-badge ' + state;
  b.innerHTML = `<span class="sync-dot"></span> ${state === 'ok' ? 'ao vivo' : state === 'error' ? 'sem conexão' : 'sincronizando'}`;
}

// Fallback: se Firebase demorar >4s, mostra o app mesmo assim
setTimeout(() => {
  if (document.getElementById('loading').style.display !== 'none') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    setSyncBadge('error');
    renderSingle();
  }
}, 4000);

// ═══════════════════════════════════════════════════════════
// UTILITÁRIOS DE DATA
// ═══════════════════════════════════════════════════════════
function dateKey(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return d.toISOString().slice(0,10);
}
function dateKeyFromDate(date) { return date.toISOString().slice(0,10); }
function formatDate(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  const s = d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
  if (off === 0) return 'Hoje · ' + s;
  if (off === 1) return 'Amanhã · ' + s;
  return s;
}
function getRoom(id) { return rooms.find(r => r.id === id); }

// ═══════════════════════════════════════════════════════════
// FIREBASE — ESCREVER / DELETAR
// ═══════════════════════════════════════════════════════════
function setB(roomId, off, hour, name) {
  const k = roomId + '|' + dateKey(off) + '|' + hour;
  if (!fbReady) { bookings[k] = name; refreshCurrentView(); return; }
  if (name === null) {
    delete bookings[k];
    fbRemove(fbRef(db, 'bookings/' + encodeKey(k)));
  } else {
    bookings[k] = name;
    fbSet(fbRef(db, 'bookings/' + encodeKey(k)), name);
  }
}
function setBByKey(fullKey, name) {
  if (!fbReady) { if (name===null) delete bookings[fullKey]; else bookings[fullKey]=name; refreshCurrentView(); return; }
  if (name===null) { delete bookings[fullKey]; fbRemove(fbRef(db,'bookings/'+encodeKey(fullKey))); }
  else { bookings[fullKey]=name; fbSet(fbRef(db,'bookings/'+encodeKey(fullKey)),name); }
}
function encodeKey(k) { return k.replace(/\|/g,'__').replace(/:/g,'_'); }
function getB(roomId, off, hour) { return bookings[roomId+'|'+dateKey(off)+'|'+hour] || null; }
function getBByDate(roomId, dateStr, hour) { return bookings[roomId+'|'+dateStr+'|'+hour] || null; }

function saveRoomsToFb() {
  if (!fbReady) return;
  fbSet(fbRef(db, 'rooms'), rooms);
  localStorage.setItem('grav_rooms', JSON.stringify(rooms));
}

// ═══════════════════════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════════════════════
function changeDate(dir) {
  currentDateOffset += dir;
  document.getElementById('date-label').textContent = formatDate(currentDateOffset);
  if (currentView === 'single') renderSingle();
  else if (currentView === 'overview') renderOverview();
}

function switchView(v, el) {
  currentView = v;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['single','overview','calendar'].forEach(id =>
    document.getElementById('view-'+id).style.display = id===v ? 'block' : 'none'
  );
  const dateNav = document.getElementById('date-nav-bar');
  dateNav.style.display = v === 'calendar' ? 'none' : 'flex';
  if (v==='single') renderSingle();
  else if (v==='overview') renderOverview();
  else renderCalendar();
}

function refreshCurrentView() {
  if (currentView==='single') renderSingle();
  else if (currentView==='overview') renderOverview();
  else renderCalendar();
}

// ═══════════════════════════════════════════════════════════
// RENDER — POR SALA
// ═══════════════════════════════════════════════════════════
function renderRoomTabs() {
  const ct = document.getElementById('room-tabs'); ct.innerHTML='';
  rooms.forEach(r => {
    const t = document.createElement('div');
    t.className = 'rtab' + (r.id===currentRoom ? ' active' : '');
    t.textContent = r.icon + ' ' + r.name;
    if (r.id===currentRoom) t.style.background = r.color.hex;
    t.onclick = () => { currentRoom = r.id; renderSingle(); };
    ct.appendChild(t);
  });
}

function renderSingle() {
  renderRoomTabs();
  const room = getRoom(currentRoom);
  const ct = document.getElementById('schedule'); ct.innerHTML='';
  if (!room) return;
  HOURS.forEach(h => {
    const b = getB(currentRoom, currentDateOffset, h);
    const row = document.createElement('div'); row.className='srow';
    const lbl = document.createElement('div'); lbl.className='tlbl'; lbl.textContent=h+'h';
    const slot = document.createElement('div');
    if (b) {
      slot.className='slot booked';
      slot.style.background = room.color.light;
      slot.style.borderColor = room.color.hex+'88';
      slot.style.color       = room.color.text;
      slot.innerHTML = `<span class="bname">${b}</span><span class="btag" style="background:${room.color.hex}22;color:${room.color.text}">reservado</span>`;
      slot.onclick = () => openCancelModal(currentRoom, currentDateOffset, h, b);
    } else {
      slot.className='slot';
      slot.innerHTML = `<span class="free-lbl">Disponível</span><span class="plus-i">+</span>`;
      slot.onclick = () => openModal(currentRoom, currentDateOffset, h);
    }
    row.appendChild(lbl); row.appendChild(slot); ct.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER — VISÃO GERAL
// ═══════════════════════════════════════════════════════════
function renderOverview() {
  const ct = document.getElementById('overview'); ct.innerHTML='';
  rooms.forEach(room => {
    const sec = document.createElement('div'); sec.className='ov-room';
    const hdr = document.createElement('div'); hdr.className='ov-room-header';
    const dot = document.createElement('div'); dot.className='ov-dot'; dot.style.background=room.color.hex;
    const nm  = document.createElement('div'); nm.className='ov-name'; nm.textContent=room.icon+' '+room.name;
    hdr.appendChild(dot); hdr.appendChild(nm); sec.appendChild(hdr);
    const sDiv = document.createElement('div'); sDiv.className='ov-slots';
    HOURS.forEach(h => {
      const b = getB(room.id, currentDateOffset, h);
      const s = document.createElement('div');
      s.className = 'ov-slot'+(b?' ov-booked':'');
      if (b) { s.style.background=room.color.hex; s.title=b; }
      s.textContent = h+'h';
      s.onclick = () => { if(b) openCancelModal(room.id,currentDateOffset,h,b); else { currentRoom=room.id; openModal(room.id,currentDateOffset,h); } };
      sDiv.appendChild(s);
    });
    sec.appendChild(sDiv); ct.appendChild(sec);
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER — CALENDÁRIO MENSAL
// ═══════════════════════════════════════════════════════════
function renderCalendar() {
  const ct = document.getElementById('calendar'); ct.innerHTML='';

  // Header do mês
  const hdr = document.createElement('div'); hdr.className='cal-header';
  const monthStr = calendarMonth.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  hdr.innerHTML = `
    <button class="cal-nav-btn" onclick="calMonth(-1)">‹</button>
    <h2>${monthStr}</h2>
    <button class="cal-nav-btn" onclick="calMonth(1)">›</button>
  `;
  ct.appendChild(hdr);

  // Grade de dias
  const grid = document.createElement('div'); grid.className='cal-grid';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d => {
    const wd = document.createElement('div'); wd.className='cal-weekday'; wd.textContent=d; grid.appendChild(wd);
  });

  const year  = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const first = new Date(year, month, 1);
  const last  = new Date(year, month+1, 0);
  const today = new Date(); today.setHours(0,0,0,0);

  // Dias do mês anterior para completar a primeira semana
  for (let i=0; i<first.getDay(); i++) {
    const prev = new Date(year, month, -first.getDay()+1+i);
    const cell = makeCalDay(prev, true); grid.appendChild(cell);
  }
  // Dias do mês
  for (let d=1; d<=last.getDate(); d++) {
    const date = new Date(year, month, d);
    const cell = makeCalDay(date, false); grid.appendChild(cell);
  }
  // Completar última semana
  const lastDay = last.getDay();
  if (lastDay < 6) {
    for (let i=1; i<=6-lastDay; i++) {
      const next = new Date(year, month+1, i);
      const cell = makeCalDay(next, true); grid.appendChild(cell);
    }
  }
  ct.appendChild(grid);

  // Detalhe do dia selecionado
  if (selectedCalDay) renderCalDayDetail(ct, selectedCalDay);
}

function makeCalDay(date, otherMonth) {
  const cell = document.createElement('div');
  const dateStr = dateKeyFromDate(date);
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = date.getTime()===today.getTime();
  const isSel   = selectedCalDay && dateKeyFromDate(selectedCalDay)===dateStr;

  // Verifica se tem reservas
  let hasBookings = false;
  rooms.forEach(r => {
    HOURS.forEach(h => { if (bookings[r.id+'|'+dateStr+'|'+h]) hasBookings=true; });
  });

  cell.className = 'cal-day'
    + (otherMonth  ? ' other-month' : '')
    + (isToday     ? ' today'       : '')
    + (isSel && !isToday ? ' selected' : '')
    + (hasBookings ? ' has-bookings': '');
  cell.textContent = date.getDate();
  cell.onclick = () => {
    selectedCalDay = new Date(date);
    renderCalendar();
  };
  return cell;
}

function renderCalDayDetail(ct, date) {
  const dateStr = dateKeyFromDate(date);
  const dateLabel = date.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  const detail = document.createElement('div'); detail.className='cal-day-detail';
  const h3 = document.createElement('h3'); h3.textContent = dateLabel; detail.appendChild(h3);

  let count = 0;
  rooms.forEach(room => {
    HOURS.forEach(h => {
      const b = bookings[room.id+'|'+dateStr+'|'+h];
      if (b) {
        count++;
        const item = document.createElement('div'); item.className='cal-booking-item';
        item.innerHTML = `
          <div class="cal-booking-dot" style="background:${room.color.hex}"></div>
          <div class="cal-booking-info">
            <div class="cal-booking-time">${h}h – ${h+1}h</div>
            <div class="cal-booking-room">${room.icon} ${room.name}</div>
          </div>
          <div class="cal-booking-name">${b}</div>
        `;
        detail.appendChild(item);
      }
    });
  });

  if (count===0) {
    const em = document.createElement('p'); em.className='cal-empty'; em.textContent='Nenhuma reserva neste dia.'; detail.appendChild(em);
  }
  ct.appendChild(detail);
}

function calMonth(dir) {
  calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth()+dir, 1);
  renderCalendar();
}

// ═══════════════════════════════════════════════════════════
// CONFIGURAÇÕES
// ═══════════════════════════════════════════════════════════
function openSettings() {
  renderSettings();
  document.getElementById('settings-overlay').classList.add('open');
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  document.getElementById('settings-panel').classList.remove('open');
}

function renderSettings() {
  const ct = document.getElementById('settings-content'); ct.innerHTML='';
  const intro = document.createElement('p');
  intro.style.cssText='font-size:13px;color:var(--text2);margin-bottom:1.25rem';
  intro.textContent='Renomeie, troque cores ou adicione salas. Mudanças valem para todos os professores.';
  ct.appendChild(intro);

  rooms.forEach(room => {
    const card=document.createElement('div'); card.className='room-card';
    const hdr=document.createElement('div'); hdr.className='room-card-hdr';
    const dot=document.createElement('div'); dot.className='dot'; dot.style.background=room.color.hex;
    const nm=document.createElement('span'); nm.textContent=room.name;
    hdr.appendChild(dot); hdr.appendChild(nm); card.appendChild(hdr);

    const l1=document.createElement('label'); l1.className='field-label'; l1.textContent='Nome da sala';
    const inp=document.createElement('input'); inp.className='field-input'; inp.type='text'; inp.value=room.name; inp.maxLength=30; inp.id='rname-'+room.id;
    card.appendChild(l1); card.appendChild(inp);

    const l2=document.createElement('label'); l2.className='field-label'; l2.textContent='Cor';
    const crow=document.createElement('div'); crow.className='color-row';
    COLOR_OPTIONS.forEach(c => {
      const cp=document.createElement('div'); cp.className='cpick'+(c.hex===room.color.hex?' selected':'');
      cp.style.background=c.hex; cp.title=c.label;
      cp.setAttribute('data-rid',room.id); cp.setAttribute('data-hex',c.hex);
      cp.onclick=function(){document.querySelectorAll('[data-rid="'+room.id+'"]').forEach(x=>x.classList.remove('selected')); this.classList.add('selected');};
      crow.appendChild(cp);
    });
    card.appendChild(l2); card.appendChild(crow);

    const acts=document.createElement('div'); acts.className='card-actions';
    const sv=document.createElement('button'); sv.className='btn btn-primary'; sv.textContent='Salvar'; sv.onclick=()=>saveRoom(room.id); acts.appendChild(sv);
    if (rooms.length>1) { const dl=document.createElement('button'); dl.className='btn btn-danger'; dl.textContent='Remover'; dl.onclick=()=>deleteRoom(room.id); acts.appendChild(dl); }
    card.appendChild(acts); ct.appendChild(card);
  });

  const addBtn=document.createElement('button'); addBtn.className='add-room-btn'; addBtn.textContent='+ Adicionar nova sala'; addBtn.onclick=addRoom; ct.appendChild(addBtn);
}

function saveRoom(id) {
  const room=getRoom(id);
  const newName=document.getElementById('rname-'+id).value.trim();
  if (!newName){showToast('Digite um nome.'); return;}
  const sel=document.querySelector('.cpick.selected[data-rid="'+id+'"]');
  const newColor=sel?COLOR_OPTIONS.find(c=>c.hex===sel.getAttribute('data-hex')):room.color;
  room.name=newName; room.color=newColor||room.color;
  saveRoomsToFb(); renderSettings(); refreshCurrentView();
  showToast('✓ Sala "'+newName+'" atualizada!');
}

function deleteRoom(id) {
  if (rooms.length<=1){showToast('Precisa ter ao menos uma sala.');return;}
  rooms=rooms.filter(r=>r.id!==id);
  if (currentRoom===id) currentRoom=rooms[0].id;
  saveRoomsToFb(); renderSettings(); refreshCurrentView();
  showToast('Sala removida.');
}

function addRoom() {
  const newId='room_'+Date.now();
  const used=rooms.map(r=>r.color.hex);
  const free=COLOR_OPTIONS.find(c=>!used.includes(c.hex))||COLOR_OPTIONS[0];
  rooms.push({id:newId,name:'Nova Sala',icon:'◆',color:free});
  saveRoomsToFb(); renderSettings();
  showToast('Nova sala adicionada!');
}

// ═══════════════════════════════════════════════════════════
// MODAIS
// ═══════════════════════════════════════════════════════════
function openModal(roomId, off, hour) {
  pendingSlot={roomId,off,hour};
  const room=getRoom(roomId);
  document.getElementById('modal-title').textContent='Reservar — '+room.name;
  document.getElementById('modal-sub').textContent=formatDate(off)+' · '+hour+'h às '+(hour+1)+'h';
  document.getElementById('prof-name').value='';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('prof-name').focus(),150);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open'); pendingSlot=null;}
function confirmBooking(){
  const name=document.getElementById('prof-name').value.trim();
  if (!name){document.getElementById('prof-name').focus(); return;}
  setB(pendingSlot.roomId,pendingSlot.off,pendingSlot.hour,name);
  const room=getRoom(pendingSlot.roomId);
  closeModal();
  showToast('✓ '+room.name+' reservada para '+name+'!');
}

function openCancelModal(roomId, off, hour, name) {
  cancelSlot={roomId,off,hour};
  const room=getRoom(roomId);
  document.getElementById('cancel-title').textContent='Sala '+room.name;
  document.getElementById('cancel-sub').textContent=name+' · '+formatDate(off)+' · '+hour+'h às '+(hour+1)+'h';
  document.getElementById('cancel-modal-bg').classList.add('open');
}
function closeCancelModal(){document.getElementById('cancel-modal-bg').classList.remove('open'); cancelSlot=null;}
function doCancel(){
  setB(cancelSlot.roomId,cancelSlot.off,cancelSlot.hour,null);
  closeCancelModal();
  showToast('Reserva cancelada.');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.getElementById('date-label').textContent = formatDate(0);
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal();});
document.getElementById('cancel-modal-bg').addEventListener('click',e=>{if(e.target.id==='cancel-modal-bg')closeCancelModal();});
document.getElementById('prof-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmBooking();});
</script>
